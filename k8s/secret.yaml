# K8s Secret for sensitive DB credentials.
# Values must be base64-encoded. Generate with: echo -n 'value' | base64
#
# Example below uses placeholders:
#   username: ecom_user   -> base64: ZWNvbV91c2Vy
#   password: StrongPass123 -> base64: U3Ryb25nUGFzczEyMw==
#
# NEVER commit real production secrets to Git. Use sealed-secrets,
# external-secrets-operator, or HashiCorp Vault in real environments.

apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secret
  namespace: ecommerce
type: Opaque
data:
  SPRING_DATASOURCE_USERNAME: ZWNvbV91c2Vy
  SPRING_DATASOURCE_PASSWORD: U3Ryb25nUGFzczEyMw==
  MYSQL_ROOT_PASSWORD: U3Ryb25nUGFzczEyMw==
  MYSQL_DATABASE: ZWNvbW1lcmNlX2Ri
  MYSQL_USER: ZWNvbV91c2Vy
  MYSQL_PASSWORD: U3Ryb25nUGFzczEyMw==
